services:
  # Laravel backend application (PHP-FPM)
  backend-app:
    build:
      context: ./backend
    environment:
      - APP_ENV=production
      - APP_DEBUG=true # Set to false in real production
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=latex
      - DB_USERNAME=latex_user
      - DB_PASSWORD=latex_password
      - QUEUE_CONNECTION=database
    volumes:
      - ./backend:/var/web
    depends_on:
      - db

  # Laravel queue worker
  backend-worker:
    build:
      context: ./backend
    command: php artisan queue:work --verbose --tries=3 --timeout=0
    environment:
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=latex
      - DB_USERNAME=latex_user
      - DB_PASSWORD=latex_password
      - QUEUE_CONNECTION=database
    volumes:
      - ./backend:/var/web
    depends_on:
      - backend-app

  # Nginx server to handle HTTP traffic and forward PHP requests
  backend-nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    environment:
      - BACKEND_ROOT=/var/web
      - BACKEND_HOST=backend-app
    volumes:
      - ./backend/docker/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./backend:/var/web:ro
    depends_on:
      - backend-app

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: latex
      POSTGRES_USER: latex_user
      POSTGRES_PASSWORD: latex_password
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
