version: '3.8'

services:
  # Laravel backend application (PHP-FPM)
  backend-app:
    build:
      context: ./backend
    # We use path-alignment: container workdir matches host absolute path.
    # This allows Docker-out-of-Docker sibling containers to resolve volume mounts.
    working_dir: ${PWD}/backend
    environment:
      - APP_ENV=production
      - APP_DEBUG=true # Set to false in real production
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=sqlite
      # If using sqlite, we store it in the database directory:
      - DB_DATABASE=${PWD}/backend/database/database.sqlite
      - QUEUE_CONNECTION=database
      # Override the local storage root so that paths sent to host dockerd match
      - LOCAL_STORAGE_ROOT=${PWD}/backend/storage/app/private
      - LATEX_COMPILER_IMAGE=my-latex:basic
    volumes:
      - ./backend:${PWD}/backend
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db

  # Laravel queue worker
  backend-worker:
    build:
      context: ./backend
    working_dir: ${PWD}/backend
    command: php artisan queue:work --verbose --tries=3 --timeout=0
    environment:
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=sqlite
      - DB_DATABASE=${PWD}/backend/database/database.sqlite
      - QUEUE_CONNECTION=database
      - LOCAL_STORAGE_ROOT=${PWD}/backend/storage/app/private
      - LATEX_COMPILER_IMAGE=my-latex:basic
    volumes:
      - ./backend:${PWD}/backend
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - backend-app

  # Nginx server to handle HTTP traffic and forward PHP requests
  backend-nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    environment:
      - BACKEND_ROOT=${PWD}/backend
      - BACKEND_HOST=backend-app
    volumes:
      - ./backend/docker/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./backend:${PWD}/backend:ro
    depends_on:
      - backend-app

  # MySQL database (optional if using SQLite)
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: latex
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: latex_user
      MYSQL_PASSWORD: latex_password
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
